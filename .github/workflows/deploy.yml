name: Deploy to Server

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'server.cjs'
      - 'server/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'vite.config.ts'
      - 'index.html'
      - 'public/**'

concurrency:
  group: deploy-creapopop
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync to server
        run: |
          # 复用单条 SSH 连接（ControlMaster），并对短时连接限流做重试，避免 "connection unexpectedly closed"
          SSH_OPTS="-o ConnectTimeout=30 -o ServerAliveInterval=15 -o ControlMaster=auto -o ControlPath=~/.ssh/cm-%r@%h:%p -o ControlPersist=120"

          n=0
          until [ $n -ge 3 ]; do
            rsync -az --delete \
              -e "ssh $SSH_OPTS" \
              --rsync-path="mkdir -p ${{ secrets.DEPLOY_PATH }} && rsync" \
              --exclude='node_modules/' \
              --exclude='dist/' \
              --exclude='.git/' \
              --exclude='.cursor/' \
              --exclude='.env' \
              --exclude='.env.*' \
              --exclude='secrets/' \
              --exclude='.data/' \
              --exclude='*.tsbuildinfo' \
              --exclude='.DS_Store' \
              ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/ && break
            n=$((n+1))
            echo "rsync 第 $n 次失败（可能是 SSH 连接限流），等待 ${n}0s 后重试…"
            sleep ${n}0
          done
          [ $n -lt 3 ]

      - name: Build and restart container
        env:
          REMOTE: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
          REMOTE_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -o ConnectTimeout=30 -o ServerAliveInterval=15 $REMOTE bash -se <<EOF
            set -euo pipefail
            cd $REMOTE_PATH
            # 构建前清理可回收的构建缓存/悬空镜像，避免磁盘占满导致 build 失败
            docker builder prune -f >/dev/null 2>&1 || true
            docker image prune -f >/dev/null 2>&1 || true
            docker compose build
            docker compose up -d
            sleep 3
            docker compose logs --tail=20
          EOF

      - name: Verify deployment
        env:
          REMOTE: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
        run: |
          HTTP_CODE=$(ssh $REMOTE "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9528/health" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Deployment verified (HTTP 200)"
          else
            echo "::warning::Health check returned HTTP $HTTP_CODE"
            ssh $REMOTE "docker logs creapopop --tail 20" || true
            exit 1
          fi
